<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BasuCero - ¡Puntos Ganados!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F4F9F4;
            color: #1E2A32;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('assets/logo.png');
            background-repeat: repeat;
            background-size: 120px;
            background-attachment: fixed;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(244, 249, 244, 0.88);
            z-index: -1;
        }
        .success-container {
            text-align: center;
            background: white;
            padding: 50px 40px;
            border-radius: 60px;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .check-icon {
            font-size: 5rem;
            color: #2B7A4B;
            background-color: #C8E6C9;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        h1 {
            font-size: 2.2rem;
            color: #1B5E2F;
            margin-bottom: 16px;
        }
        .puntos-destacados {
            font-size: 3rem;
            font-weight: 800;
            color: #FFB74D;
            background: #1B5E2F;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 60px;
            margin: 20px 0;
            letter-spacing: 2px;
        }
        .mensaje {
            font-size: 1.2rem;
            margin: 20px 0;
            color: #2d3e2d;
        }
        .btn-regresar {
            background-color: #2B7A4B;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            text-decoration: none;
        }
        .btn-regresar:hover {
            background-color: #1B5E2F;
            transform: scale(0.97);
        }
        .footer-mini {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #6c7a6c;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="check-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>¡Felicidades!</h1>
        <p class="mensaje">Has ganado</p>
        <div class="puntos-destacados" id="puntosMostrar">0 puntos</div>
        <p class="mensaje">en <strong>BasuCero</strong>.<br>Ya están acreditados en tu cuenta ecológica.</p>
        <a href="index.html" class="btn-regresar"><i class="fas fa-arrow-left"></i> Volver a BasuCero</a>
        <div class="footer-mini">
            <i class="fas fa-leaf"></i> Sigue reciclando y acumulando más beneficios.
        </div>
    </div>

    <script>
        // Leer el parámetro 'puntos' de la URL
        const urlParams = new URLSearchParams(window.location.search);
        let puntos = urlParams.get('puntos');
        if (puntos === null || isNaN(puntos) || puntos <= 0) {
            puntos = 0;
        }
        const puntosMostrar = document.getElementById('puntosMostrar');
        puntosMostrar.textContent = `${puntos} puntos`;
        // Si no hay puntos o es cero, se puede mostrar un mensaje alternativo
        if (puntos == 0) {
            puntosMostrar.textContent = "0 puntos";
            document.querySelector('.mensaje').innerHTML = "No se encontraron puntos válidos.<br>Intenta generar el QR nuevamente.";
        }
    </script>
</body>
</html>
